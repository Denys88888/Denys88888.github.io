name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Official GitHub Pages deployment (upload artifact + deploy). Avoids the
# branch-based "pages build and deployment" (Jekyll) step entirely.
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install & build
        env:
          VITE_API_URL: https://taxi-pro-server.onrender.com
          VITE_WS_URL: wss://taxi-pro-server.onrender.com
          # sandbox:true is only for debugging OUTSIDE the Pi Browser — inside
          # the real Pi Browser it makes Pi.authenticate hang. Must be false.
          VITE_PI_SANDBOX: 'false'
        run: |
          npm ci
          npm run build

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
