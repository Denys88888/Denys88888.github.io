name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Quality gate: type-check, unit tests (vitest) and a production build must all
# pass before code reaches main. Runs independently of deploy.yml.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run typecheck

      - name: Unit tests
        run: npm test

      - name: Production build
        run: npm run build
        env:
          VITE_API_URL: https://taxi-pro-server.onrender.com
          VITE_WS_URL: wss://taxi-pro-server.onrender.com
