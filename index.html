<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#7B3FE4" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <!-- The web manifest link is injected by vite-plugin-pwa (manifest.webmanifest). -->
    <link rel="icon" type="image/png" href="/icons/icon-192.png" />
    <link rel="apple-touch-icon" href="icons/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Fonts loaded non-render-blocking: fetch as print (ignored for layout),
         then swap to all once ready. A <noscript> keeps them for no-JS. -->
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
      rel="stylesheet"
      media="print"
      onload="this.media='all'"
    />
    <noscript>
      <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
    </noscript>
    <title>Taxi Pro</title>
    <!-- Pi Network SDK (available only inside the Pi Browser). `defer` keeps it
         off the render-blocking path — the app only touches window.Pi from a
         mount effect, which runs after all deferred scripts have executed. -->
    <script src="https://sdk.minepi.com/pi-sdk.js" defer></script>
    <style>
      /* Branded first-paint loader shown inside #root until React mounts, so a
         slow bundle fetch shows the logo instead of a blank white screen. */
      #app-boot {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 20px;
        background: #7b3fe4;
      }
      #app-boot .boot-logo {
        width: 84px;
        height: 84px;
        border-radius: 22px;
        background: rgba(255, 255, 255, 0.15);
        display: flex;
        align-items: center;
        justify-content: center;
        animation: boot-pulse 1.4s ease-in-out infinite;
      }
      #app-boot .boot-bar {
        width: 150px;
        height: 4px;
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.2);
        overflow: hidden;
      }
      #app-boot .boot-bar > span {
        display: block;
        width: 45%;
        height: 100%;
        background: #fff;
        border-radius: 999px;
        animation: boot-slide 1.3s ease-in-out infinite;
      }
      @keyframes boot-pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
      @keyframes boot-slide {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(340%); }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div id="app-boot">
        <div class="boot-logo">
          <svg width="42" height="42" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.75" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 17h2c.6 0 1-.4 1-1v-3c0-.9-.7-1.7-1.5-1.9L18 10l-2.7-3.4A2 2 0 0 0 13.7 6H10.3a2 2 0 0 0-1.6.8L6 10l-2.5 1.1C2.7 11.3 2 12.1 2 13v3c0 .6.4 1 1 1h2" />
            <circle cx="7" cy="17" r="2" /><circle cx="17" cy="17" r="2" />
          </svg>
        </div>
        <div class="boot-bar"><span></span></div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
