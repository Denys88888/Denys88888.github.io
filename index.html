    <script>
      // Prevent FOUC - set theme before React loads
      (function() {
        var theme = localStorage.getItem('taxipro_theme') || 'system';
        var resolved = theme;
        if (theme === 'system') {
          resolved = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
        }
        document.documentElement.classList.add(resolved);
        document.documentElement.setAttribute('data-theme', resolved);
      })();
    </script>

  <body>
    <div id="root"></div>
    <script>
      // GPS Geolocation — save real location for app to use
      if (navigator.geolocation) {
        navigator.geolocation.getCurrentPosition(
          (pos) => {
            const loc = { lat: pos.coords.latitude, lng: pos.coords.longitude, name: 'Мое местоположение', address: 'Текущее местоположение' };
            localStorage.setItem('taxipro_gps_pickup', JSON.stringify(loc));
            console.log('[GPS] Location saved:', loc);
          },
          () => { console.log('[GPS] Permission denied, using default'); },
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 60000 }
        );
      }
    </script>

    <!-- Force refresh Service Worker on every load -->
    <script>
      (function() {
        if ('serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations().then(function(regs) {
            regs.forEach(function(reg) {
              reg.update();
              console.log('[SW] Checked for update');
            });
          });
        }
      })();
    </script>
    <!-- Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', function() {
          // Register main PWA Service Worker (caching, offline support)
          navigator.serviceWorker.register('/sw.js')
            .then(function(reg) {
              console.log('[SW] PWA Service Worker registered:', reg.scope);
              // Listen for updates
              reg.addEventListener('updatefound', function() {
                const newWorker = reg.installing;
                newWorker.addEventListener('statechange', function() {
                  if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                    console.log('[SW] New update available, reload to activate');
                  }
                });
              });
            })
            .catch(function(err) {
              console.log('[SW] PWA SW registration failed:', err);
            });

          // Register Firebase Messaging Service Worker (push notifications)
          // This SW is separate because FCM needs its own message handling
          navigator.serviceWorker.register('/firebase-messaging-sw.js')
            .then(function(reg) {
              console.log('[FCM SW] Firebase Messaging SW registered:', reg.scope);
            })
            .catch(function(err) {
              console.log('[FCM SW] Registration failed:', err);
            });
        });
      }
    </script>
