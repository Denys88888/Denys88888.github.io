<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Taxi Pro — Reset</title>
    <!-- Support page: wipes the app's local session + service worker caches,
         then returns to the app. Use when a stale cached build misbehaves. -->
    <script>
      (async () => {
        try { localStorage.clear(); sessionStorage.clear(); } catch (e) {}
        try {
          if ('serviceWorker' in navigator) {
            const regs = await navigator.serviceWorker.getRegistrations();
            await Promise.all(regs.map((r) => r.unregister()));
          }
          if (window.caches) {
            const keys = await caches.keys();
            await Promise.all(keys.map((k) => caches.delete(k)));
          }
        } catch (e) {}
        location.replace('/');
      })();
    </script>
  </head>
  <body>Resetting…</body>
</html>
